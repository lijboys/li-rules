#!name: NooM Pro Template
#NAME: NooM Pro Template
# ========================
# NooM Pro Template
# 远程配置模板版：已移除内置订阅，适配 sublinks / 订阅转换
# ========================

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
secret: "123456"

external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-name: zashboard
external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    - "*.lan"
    - "stun.*"

tun:
  enable: true
  stack: system
  device: utun
  auto-route: true
  auto-detect-interface: true

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

default: &default
  type: select
  icon: "https://github.545024.xyz/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png"
  proxies: [所有-手动, 所有-自动, 🇭🇰 香港地区, 🇨🇳 台湾地区, 🇯🇵 日本地区, 🇸🇬 新加坡, 🇰🇷 韩国地区, 🇺🇸 美国地区, 🇪🇺 其他地区, 直连, 拒绝]

proxy-groups:
  - name: 所有-手动
    type: select
    icon: "https://github.545024.xyz/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png"
    proxies:
      - 所有-自动
      - ⚡ 香港自动
      - ⚡ 台湾自动
      - ⚡ 日本自动
      - ⚡ 狮城自动
      - ⚡ 韩国自动
      - ⚡ 美国自动
      - ⚡ 其他自动
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"

  - name: 所有-自动
    type: fallback
    icon: "https://github.545024.xyz/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
    include-all: true
    interval: 300
    url: "http://www.gstatic.com/generate_204"
    filter: "^((?!(直连|拒绝)).)*$"

